# ═══════════════════════════════════════════════════════════════════════════════
# Status Line — Default Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Override any of these in ~/.claude/statusline.conf
# ═══════════════════════════════════════════════════════════════════════════════

# Sections to display (comma-separated, order matters)
# Available: context,model,perms,tokens,cost,rate,env,files,skills,mcps,agent,dir,quote
STATUSLINE_SECTIONS="context,env,tokens,cost,rate,skills,mcps,agent,dir,files"

# Theme: dark | light | minimal
# minimal renders through the terminal's own 16-color ANSI palette, so it
# adapts to light/dark and matches the WorkDesk plugin's terminal surface
# (dark washed out on the light cream surface).
STATUSLINE_THEME="minimal"

# Max lines: 1 or 2
STATUSLINE_LINES=2

# Context bar width: auto (based on terminal), or a fixed number
STATUSLINE_CONTEXT_BAR_WIDTH="auto"

# Show loaded context files
STATUSLINE_FILES_ENABLED=true

# Show rate limit reset times (not just percentages)
STATUSLINE_RATE_RESET_TIMES=true

# Timezone for rate-limit reset times (empty = system local timezone)
STATUSLINE_RATE_TZ=""

# Quote of the day
STATUSLINE_QUOTE_ENABLED=false
STATUSLINE_QUOTE_FILE="$HOME/.claude/statusline/cache/quote.txt"

# Sparklines (usage history)
STATUSLINE_SPARKLINE_ENABLED=false

# Cache TTL in seconds for expensive lookups
STATUSLINE_CACHE_TTL=300
